# =============================================================================
# docker-compose.yml — Full Production Stack
# =============================================================================
#
# Stack bao gồm 3 services:
#   1. agent   — AI Agent (FastAPI app), scale 3 instances
#   2. redis   — In-memory store (rate limit, cost tracking, conversation)
#   3. nginx   — Load balancer + reverse proxy (phân phối traffic giữa agents)
#
# KIẾN TRÚC:
#
#   Internet
#      │
#      ▼
#   [Nginx :80]  ← load balancer
#      │
#   Round-robin
#    ┌──┼──┐
#    ▼  ▼  ▼
# [Agent] [Agent] [Agent]  (3 instances, port 8000 internal)
#    │      │      │
#    └──────┼──────┘
#           ▼
#        [Redis]  (1 instance, shared state)
#
# CÁCH CHẠY:
#   # 1 instance (dev):
#   docker compose up
#
#   # 3 instances (prod-like):
#   docker compose up --scale agent=3
#
#   # Background:
#   docker compose up -d --scale agent=3
#
#   # Xem logs:
#   docker compose logs -f agent
#
# =============================================================================

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Networks — mạng nội bộ giữa các containers
# ─────────────────────────────────────────────────────────────────────────────
networks:
  agent-net:
    # bridge: containers trong cùng network có thể nói chuyện qua tên service
    # agent có thể gọi redis qua hostname "redis" (không cần biết IP)
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# Volumes — persistent storage (data sống sót qua restart)
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  redis-data:
    # Nếu không có volume → Redis mất toàn bộ data khi restart container!
    # Volume được lưu tại: /var/lib/docker/volumes/06-lab-complete_redis-data/

services:

  # ── Agent (FastAPI) ─────────────────────────────────────────────────────────
  agent:
    build:
      context: .         # Docker build context = thư mục hiện tại
      dockerfile: Dockerfile
    # Không expose port ra ngoài trực tiếp!
    # Traffic phải đi qua Nginx (bảo mật hơn, dễ scale hơn)
    # expose: ["8000"]   # chỉ expose trong internal network
    environment:
      # Override config tại đây không cần .env file
      ENVIRONMENT: staging
      APP_NAME: "Production AI Agent"
      APP_VERSION: "1.0.0"
      # Redis URL: dùng tên service "redis" làm hostname
      # Docker DNS tự resolve "redis" → IP của redis container
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_PER_MINUTE: "10"
      DAILY_BUDGET_USD: "5.0"
    env_file:
      # File này chứa secrets (AGENT_API_KEY, OPENAI_API_KEY, ...)
      # KHÔNG commit file này lên Git!
      # Tạo từ .env.example: cp .env.example .env.local
      - .env.local
    depends_on:
      redis:
        # Chỉ start agent SAU KHI redis đã healthy
        # (tránh trường hợp agent start trước, kết nối Redis fail)
        condition: service_healthy
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s   # chờ 20s trước lần check đầu (app cần thời gian khởi động)
    # restart: unless-stopped
    #   → tự restart nếu crash, trừ khi bị stop thủ công (docker compose stop)
    restart: unless-stopped
    # Giới hạn tài nguyên (tránh 1 instance chiếm hết CPU/RAM)
    deploy:
      resources:
        limits:
          cpus: "0.50"      # tối đa 50% 1 CPU core
          memory: "512M"    # tối đa 512 MB RAM
        reservations:
          cpus: "0.10"
          memory: "128M"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine   # alpine = image nhỏ (~30MB thay vì 100MB)
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    # maxmemory: giới hạn RAM Redis dùng
    # maxmemory-policy allkeys-lru: khi đầy → xóa key ít được dùng nhất
    # save 60 1: lưu snapshot mỗi 60s nếu có ít nhất 1 key thay đổi
    # appendonly yes: ghi log mọi write operation (data safe hơn)
    volumes:
      - redis-data:/data    # persist data vào Docker volume
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ── Nginx Load Balancer ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"      # expose port 80 ra ngoài (HTTP)
      # - "443:443"  # HTTPS (cần SSL cert, uncomment khi deploy thật)
    volumes:
      # Mount nginx config vào container
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro   # :ro = read-only
    depends_on:
      - agent
    networks:
      - agent-net
    restart: unless-stopped
