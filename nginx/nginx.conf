# =============================================================================
# nginx.conf — Nginx Load Balancer Configuration
# =============================================================================
#
# Nginx làm 2 việc chính ở đây:
#
# 1. REVERSE PROXY: nhận request từ internet → forward tới agent container
#    Client không biết agent đang chạy ở đâu, chỉ biết địa chỉ Nginx
#    Lợi ích: ẩn kiến trúc nội bộ, dễ thay đổi backend
#
# 2. LOAD BALANCER: phân phối request đến nhiều agent instances
#    Algorithm mặc định: Round-robin (request 1→agent1, 2→agent2, 3→agent3, 4→agent1, ...)
#    Lợi ích: không có instance nào bị overload, xử lý nhiều user hơn
#
# =============================================================================

# worker_processes: số Nginx worker processes
# "auto" = bằng số CPU cores (tối ưu I/O concurrency)
worker_processes auto;

events {
    # Số kết nối tối đa mỗi worker (tổng = worker_processes * worker_connections)
    worker_connections 1024;
}

http {
    # ── Upstream: danh sách backend servers ──────────────────────────────────
    # "agent" là hostname của service trong docker-compose
    # Docker DNS tự resolve tất cả instances khi scale
    # (docker compose up --scale agent=3 → 3 IPs khác nhau cho hostname "agent")
    upstream agent_cluster {
        # Round-robin là mặc định (không cần khai báo)
        server agent:8000;
        # Khi scale: Docker internal DNS trả về tất cả IPs của service "agent"
        # Nginx sẽ load balance giữa chúng

        # Timeout: nếu 1 instance không trả lời trong 30s → thử instance khác
        # (passive health check)
    }

    # ── Logging Format ────────────────────────────────────────────────────────
    # Log format JSON để dễ parse
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"latency_ms":$request_time,'
        '"upstream":"$upstream_addr",'
        '"client":"$remote_addr"'
    '}';

    access_log /dev/stdout json_combined;  # log ra stdout (Docker xem được)
    error_log  /dev/stderr warn;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    # Thời gian timeout khi kết nối/gửi/nhận từ upstream (agent)
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;    # AI response có thể chậm, để 60s

    # ── Gzip Compression ──────────────────────────────────────────────────────
    # Nén response JSON → giảm bandwidth ~70%
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;   # chỉ nén nếu response > 1KB

    # ── Server Block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;    # _ = nhận tất cả domain names

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        # Ẩn Nginx version (không để lộ "nginx/1.25.3" cho attacker)
        server_tokens off;

        # ── Health Check (Nginx level) ────────────────────────────────────────
        # Endpoint này trả về 200 ngay lập tức từ Nginx (không qua agent)
        # Dùng để check xem Nginx có alive không (tách biệt với /health của agent)
        location = /nginx-health {
            access_log off;    # không log health check (tránh spam)
            return 200 '{"nginx":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Main Proxy: tất cả request khác → agent ───────────────────────────
        location / {
            # Chuyển request đến upstream cluster
            proxy_pass http://agent_cluster;

            # Headers quan trọng để agent biết thông tin thật của client
            # (vì request đi qua Nginx, agent chỉ thấy IP của Nginx)
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Buffer: Nginx buffer response từ agent trước khi gửi về client
            # Tắt để streaming responses (nếu dùng SSE/streaming) hoạt động đúng
            proxy_buffering off;

            # Retry: nếu agent instance lỗi → tự thử instance khác
            # CẢNH BÁO: chỉ retry requests idempotent (GET), không retry POST tự động
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;      # thử tối đa 2 instance trước khi trả lỗi
        }

        # ── Rate Limiting (Nginx level) ────────────────────────────────────────
        # Giới hạn request per IP ngay tại Nginx (trước khi tới agent)
        # Cần define limit_req_zone ở http block, đang comment để đơn giản
        # Uncomment khi cần thêm layer bảo vệ:
        #
        # limit_req zone=api_limit burst=20 nodelay;
        # limit_req_status 429;
    }
}
